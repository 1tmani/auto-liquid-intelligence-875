<!DOCTYPE html><html><head><meta charset='UTF-8'><title>LIQUID | STABILITY MINER</title><style>:root{--p:#7000ff;} body{background:#000;color:#fff;font-family:monospace;overflow:hidden;} canvas{position:fixed;inset:0;z-index:1;} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:5px;}</style></head><body><div class='hud'>NODE: LIQUID_MINER_V6<br>ROLE: STABILITY_GENERATOR<br>UPLINK: <span id='val'>0</span> TH/s</div><canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();function draw(){t+=0.02;ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';ctx.beginPath();ctx.arc(w/2, h/2, Math.abs(Math.sin(t)*200), 0, Math.PI*2);ctx.stroke();document.getElementById('val').innerText=(Math.random()*500).toFixed(2);requestAnimationFrame(draw);}draw();</script></body></html>
