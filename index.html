<!DOCTYPE html><html><head><meta charset='UTF-8'><title>LIQUID INTELLIGENCE</title><style>:root{--p:#7000ff;} body{background:#000;color:#fff;font-family:monospace;overflow:hidden;} canvas{position:fixed;inset:0;z-index:1;} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:4px;}</style></head><body><div class='hud'>INFRA: LIQUID_INTELLIGENCE_V2<br>STATUS: MESH_FLOW_ACTIVE</div><canvas id='c'></canvas><script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0,pts=[];function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;pts=[];for(let x=0;x<w+60;x+=60)for(let y=0;y<h+60;y+=60)pts.push({x,y,ox:x,oy:y});}res();function draw(){t+=0.05;ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';pts.forEach(p=>{const wave=Math.sin(t+p.ox*0.01)*20;ctx.beginPath();ctx.arc(p.x,p.oy+wave,1,0,Math.PI*2);ctx.stroke();});requestAnimationFrame(draw);}draw();</script></body></html>
