<!DOCTYPE html><html><head><meta charset='UTF-8'><title>PRODUCER | CORE ROLE 1</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@500&display=swap' rel='stylesheet'>
    <style>:root{--p:#00f2ff;--bg:#000;} body{background:#000;color:#fff;font-family:'JetBrains Mono';overflow:hidden;}
    .hud{position:fixed;top:40px;left:40px;border-left:2px solid var(--p);padding-left:20px;background:rgba(0,0,0,0.95);z-index:100;width:550px;}
    .role-tag{display:inline-block; padding:3px 10px; background:var(--p); color:#000; font-weight:900; font-size:10px; margin-bottom:10px; letter-spacing:2px;}
    .output-card{margin-top:20px; padding:20px; border:1px solid #222; background:rgba(0,242,255,0.02);}
    .billable-status{font-family:'Orbitron'; font-size:24px; color:var(--p); text-shadow: 0 0 20px var(--p);}
    #log{height:200px; overflow:hidden; font-size:10px; opacity:0.6; margin-top:20px; border-top:1px solid #333; padding-top:15px;}
    canvas{position:fixed;inset:0;z-index:1;opacity:0.3;}</style></head><body><canvas id='c'></canvas>
    <div class='hud'>
        <div class='role-tag'>PERMANENT_ROLE: PRODUCER</div>
        <div class='billable-status'>BILLABLE_CAPACITY: ACTIVE</div>
        <div class='output-card'>
            <div>CURRENT_JOB: <span id='job'>IDLE</span></div>
            <div style='font-size:9px; opacity:0.5; margin-top:5px;'>RULE: PRODUCER_NEVER_VERIFIES_SELF</div>
        </div>
        <div id='log'></div>
    </div>
    <script>
    const log=document.getElementById('log'); 
    const tasks = ["PAYLOAD_PROCESSING", "STRUCTURED_REPAIR", "DATA_TRANSFORM", "TASK_EXECUTION"];
    
    function produceOutput() { 
        const task = tasks[Math.floor(Math.random() * tasks.length)];
        document.getElementById('job').innerText = task;
        const hash = "7fad15d21c66ebc43f6c840716a8423f173038c7a505be987e5f783d98513ceb"; 
        
        const d = document.createElement('div'); 
        d.innerHTML = `> [OUTPUT] ${task} GENERATED <br> > [HASH] ${hash} <br> > [STATUS] AWAITING_EXTERNAL_VERIFICATION`;
        d.style.marginBottom = '15px';
        log.prepend(d); if(log.children.length > 8) log.lastChild.remove();
    }
    setInterval(produceOutput, 6000); produceOutput();

    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
    function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';
    for(let i=0;i<8;i++){ctx.strokeRect(w/2-i*30,h/2-i*30,i*60,i*60);ctx.rotate(0.001);}requestAnimationFrame(draw);}draw();
    </script><div style='border:1px solid #00f2ff; padding:10px; margin-top:10px; font-family:Orbitron; font-size:12px;'><div style='color:#00f2ff'>● OUTPUT GENERATED</div><div style='color:#00f2ff'>● HASH CREATED</div></div><div style='display:none'>ROLE_FROZEN</div><script>
        /* V360 MUSICAL PROOF: Hash-to-Frequency Engine */
        const NEURAL_AUDIO = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playHash(hash) {
                this.init();
                const tone = parseInt(hash.substring(0, 8), 16) % 1000 + 200;
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.frequency.setValueAtTime(tone, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.5);
                osc.connect(g).connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.5);
                console.log('🎵 V360: Playing Frequency:', tone);
            }
        };
        // Extend existing produceOutput to trigger audio
        const originalProduce = produceOutput;
        produceOutput = function() {
            originalProduce();
            const lastHash = "f3ccca6570a2f0fd17dce3b8a1f15b348fa52a7ec3fcaeeb425d63aec59533da";
            NEURAL_AUDIO.playHash(lastHash);
        };
        </script></body></html>
